name: ci
on:
  pull_request:
    branches: [dev, main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "k8s/**"
      - ".github/workflows/**"

concurrency:
  group: ci-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build all services (no push)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            path: frontend
            dockerfile: frontend/Dockerfile
          - name: product_service
            path: backend/product_service
            dockerfile: backend/product_service/Dockerfile
          - name: order_service
            path: backend/order_service
            dockerfile: backend/order_service/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} (no push)
        run: docker build -f ${{ matrix.dockerfile }} ${{ matrix.path }}

  post-check:
    name: Post checks (runs only if all builds succeed)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - run: echo "All matrix builds completed for PR ${{ github.event.pull_request.number || github.sha }}"
